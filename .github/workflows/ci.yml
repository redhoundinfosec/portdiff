name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        go-version: [ '1.21', '1.22', '1.23' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./cmd/portdiff/

      - name: Run tests (with race detector)
        run: go test -v -count=1 -race ./...

      - name: Run smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./portdiff version
          ./portdiff diff examples/scan-before.xml examples/scan-after.xml --no-color || true
          ./portdiff diff examples/scan-before.xml examples/scan-after.xml -f json || true
          ./portdiff summary examples/scan-before.xml --no-color

      - name: Run smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\portdiff.exe version
          .\portdiff.exe diff examples\scan-before.xml examples\scan-after.xml --no-color; $true
          .\portdiff.exe summary examples\scan-before.xml --no-color

  release:
    name: Cross-compile Release Binaries
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build release binaries
        run: make release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portdiff-binaries
          path: dist/
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Check formatting
        run: |
          FILES=$(gofmt -l .)
          if [ -n "$FILES" ]; then
            echo "The following files are not properly formatted:"
            echo "$FILES"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...
